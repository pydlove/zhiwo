        #}

        location / {
             try_files $uri $uri/ @router;
             index index.html;
			 add_header Cache-Control "no-cache, no-store";
        }

        location @router {
            rewrite ^.*$ /index.html last;
			add_header Cache-Control "no-cache, no-store";
        }
		
		gzip on;
        gzip_min_length 1k;
        gzip_comp_level 6;
        gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/json image/jpeg image/gif image/png image/webp;
        gzip_vary on;
        gzip_disable "MSIE [1-6]\.";
