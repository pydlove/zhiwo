    # ==================== 公众号创作助手 ====================
    upstream gzh-user-service {
        server 127.0.0.1:8082;
    }
    upstream gzh-admin-service {
        server 127.0.0.1:8080;
    }

    # 用户端前端 - HTTPS (443)
    # TODO: 请将 server_name 修改为你的实际域名
    server {
        listen 443 ssl;
        server_name gzh.yourdomain.com;

        ssl_certificate /root/ssl/fullchain.pem;
        ssl_certificate_key /root/ssl/domain.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;

        root /root/app/web/gzh;
        index index.html;

        location / {
            try_files $uri $uri/ @gzh_router;
            index index.html;
            add_header Cache-Control "no-cache, no-store";
        }

        location @gzh_router {
            rewrite ^.*$ /index.html last;
            add_header Cache-Control "no-cache, no-store";
        }

        gzip on;
        gzip_min_length 1k;
        gzip_comp_level 9;
        gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
        gzip_vary on;
        gzip_disable "MSIE [1-6]\.";

        # 用户端 API
        location /api {
            proxy_connect_timeout 60s;
            proxy_send_timeout 90;
            proxy_read_timeout 120;
            proxy_buffer_size 256k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            proxy_temp_file_write_size 256k;
            proxy_next_upstream error timeout invalid_header http_500 http_503 http_404;
            proxy_max_temp_file_size 128m;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://gzh-user-service;
        }

        # 文件上传（管理端后端统一管理）
        location /uploads {
            proxy_connect_timeout 60s;
            proxy_send_timeout 90;
            proxy_read_timeout 120;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://gzh-admin-service;
        }
    }

    # 用户端前端 - HTTP (80) 重定向到 HTTPS
    server {
        listen 80;
        server_name gzh.yourdomain.com;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 管理端前端 (38080)
    server {
        listen 38080;
        server_name localhost;

        root /root/app/web/gzh-admin;
        index index.html;

        location / {
            try_files $uri $uri/ @gzh_admin_router;
            index index.html;
            add_header Cache-Control "no-cache, no-store";
        }

        location @gzh_admin_router {
            rewrite ^.*$ /index.html last;
            add_header Cache-Control "no-cache, no-store";
        }

        gzip on;
        gzip_min_length 1k;
        gzip_comp_level 9;
        gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
        gzip_vary on;
        gzip_disable "MSIE [1-6]\.";

        # 管理端 API
        location /api {
            proxy_connect_timeout 60s;
            proxy_send_timeout 90;
            proxy_read_timeout 120;
            proxy_buffer_size 256k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            proxy_temp_file_write_size 256k;
            proxy_next_upstream error timeout invalid_header http_500 http_503 http_404;
            proxy_max_temp_file_size 128m;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://gzh-admin-service;
        }

        # 预览页面
        location /preview.html {
            proxy_connect_timeout 60s;
            proxy_send_timeout 90;
            proxy_read_timeout 120;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://gzh-admin-service;
        }

        # 文件上传
        location /uploads {
            proxy_connect_timeout 60s;
            proxy_send_timeout 90;
            proxy_read_timeout 120;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://gzh-admin-service;
        }
    }

}
