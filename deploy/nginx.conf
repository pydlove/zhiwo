    server {
		listen 18888;
		server_name localhost;
		
		root /root/app/web/jf_mall;
		#root /app/blsh/app/web/h5;
        index index.html;
		
		#location /am {	
		#	proxy_pass http://ahbfi.org.cn:8081/am;		
        #}
		
		#location / {				
		#	proxy_pass http://ahbfi.org.cn:8081;		
        #    try_files $uri $uri/ @router;
        #    index index.html;
        #}

        location / {
             try_files $uri $uri/ @router;
             index index.html;
			 add_header Cache-Control "no-cache, no-store";
        }

        location @router {
            rewrite ^.*$ /index.html last;
			add_header Cache-Control "no-cache, no-store";
        }
		
		gzip on;
        gzip_min_length 1k;
        gzip_comp_level 9;
        gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
        gzip_vary on;
        gzip_disable "MSIE [1-6]\.";
        
	}

    server {
		listen 18889;
		server_name localhost;
		
		root /root/app/web/wordmap/;
		#root /app/blsh/app/web/h5;
        index index.html;
		
		#location /am {	
