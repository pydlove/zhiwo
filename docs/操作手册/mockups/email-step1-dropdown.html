<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>个人中心入口</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f8fafc; color: #111827; }
  body { width: 1280px; min-height: 720px; }
</style>
</head>
<body>

<!-- Top Nav -->
<nav style="background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between;">
  <div style="display: flex; align-items: center; gap: 28px;">
    <div style="font-size: 18px; font-weight: 700; color: #111827; display: flex; align-items: center; gap: 8px;">
      <div style="width: 35px; height: 33px; border-radius: 6px; background: linear-gradient(135deg,#2563eb,#60a5fa); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700;">AI</div>
      知我公众号创作助手
    </div>
    <div style="display: flex; gap: 24px; font-size: 14px; color: #4b5563;">
      <span style="font-weight: 500; color: #2563eb;">首页</span>
      <span style="font-weight: 500;">订阅中心</span>
      <span style="font-weight: 500;">创作技巧</span>
    </div>
  </div>
  <div style="display: flex; align-items: center; gap: 12px;">
    <div style="display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; background: #dbeafe; border: 1px solid #93c5fd; color: #2563eb;">
      <span style="width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;background:#fbbf24;color:#fff;border-radius:50%;font-size:9px;font-weight:700;">V</span>
      标准版
    </div>
    <div style="display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d;">
      <span style="width: 6px; height: 6px; border-radius: 50%; background: #22c55e;"></span>
      <span>有效期至 2026-12-31</span>
    </div>
    <div style="display: flex; background: #f3f4f6; border-radius: 6px; padding: 3px; gap: 2px;">
      <span style="padding: 4px 10px; font-size: 12px; border-radius: 4px; font-weight: 500; background: #fff; color: #2563eb; box-shadow: 0 1px 2px rgba(0,0,0,0.06);">公众号</span>
      <span style="padding: 4px 10px; font-size: 12px; border-radius: 4px; font-weight: 500; color: #6b7280;">今日头条</span>
    </div>

    <!-- Avatar + Dropdown -->
    <div style="position: relative;">
      <div style="width: 32px; height: 32px; border-radius: 50%; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #6b7280; outline: 2px solid #2563eb; outline-offset: 2px;">U</div>
      <!-- Highlight ring + arrow -->
      <div style="position: absolute; top: -6px; left: -6px; width: 44px; height: 44px; border-radius: 50%; border: 2px dashed #ef4444; pointer-events:none;"></div>
      <div style="position: absolute; top: 40px; right: 0; background: #fff; border: 1px solid #f1f5f9; border-radius: 10px; box-shadow: 0 12px 28px rgba(0,0,0,0.12); min-width: 180px; padding: 6px; z-index: 50;">
        <div style="padding: 8px 14px; font-size: 12px; color: #6b7280;">
          <div style="color: #2563eb; font-weight: 500; margin-bottom: 2px;">标准版</div>
          <div>有效期至</div>
          <div style="color: #f59e0b; font-weight: 500;">2026-12-31</div>
        </div>
        <div style="height: 1px; background: #f1f5f9; margin: 6px 0;"></div>
        <div style="padding: 10px 14px; font-size: 13px; color: #fff; background: #2563eb; border-radius: 6px; font-weight: 600; display: flex; align-items: center; gap: 6px;">
          <span style="display:inline-block;width:6px;height:6px;background:#fff;border-radius:50%;"></span>
          个人中心
        </div>
        <div style="padding: 10px 14px; font-size: 13px; color: #374151; border-radius: 6px;">密码设置</div>
        <div style="height: 1px; background: #f1f5f9; margin: 6px 0;"></div>
        <div style="padding: 10px 14px; font-size: 13px; color: #374151; border-radius: 6px;">退出登录</div>
      </div>
    </div>
  </div>
</nav>

<!-- Body (blurred-ish background to direct attention to dropdown) -->
<main style="padding: 24px;">
  <div style="max-width: 1200px; margin: 0 auto; opacity: 0.55;">
    <div style="padding: 48px 0 32px;">
      <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 8px; color: #111827;">发现热门赛道，让 AI 帮你创作</h1>
      <p style="font-size: 14px; color: #6b7280;">汇聚公众号、今日头条头部博主数据，为你生成爆款选题和优质内容</p>
    </div>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 48px;">
      <div style="background:#fff;border-radius:16px;padding:20px;border:1px solid #f1f5f9;">
        <div style="font-size:13px;color:#6b7280;margin-bottom:6px;">历史推荐文章</div>
        <div style="font-size:32px;font-weight:700;color:#111827;margin-bottom:4px;">125,847</div>
        <div style="font-size:12px;color:#10b981;font-weight:500;">累计推荐文章数量</div>
      </div>
      <div style="background:#fff;border-radius:16px;padding:20px;border:1px solid #f1f5f9;">
        <div style="font-size:13px;color:#6b7280;margin-bottom:6px;">累计赛道数</div>
        <div style="font-size:32px;font-weight:700;color:#111827;margin-bottom:4px;">36</div>
        <div style="font-size:12px;color:#10b981;font-weight:500;">↑ +2 本周新增</div>
      </div>
      <div style="background:#fff;border-radius:16px;padding:20px;border:1px solid #f1f5f9;">
        <div style="font-size:13px;color:#6b7280;margin-bottom:6px;">头部博主</div>
        <div style="font-size:32px;font-weight:700;color:#111827;margin-bottom:4px;">3,420</div>
        <div style="font-size:12px;color:#10b981;font-weight:500;">↑ +28 本周新增</div>
      </div>
      <div style="background:#fff;border-radius:16px;padding:20px;border:1px solid #f1f5f9;">
        <div style="font-size:13px;color:#6b7280;margin-bottom:6px;">爆款文章库</div>
        <div style="font-size:32px;font-weight:700;color:#111827;margin-bottom:4px;">28,650</div>
        <div style="font-size:12px;color:#10b981;font-weight:500;">↑ +152 本周新增</div>
      </div>
    </div>
  </div>
</main>

<!-- Step caption arrow -->
<div style="position:absolute;top:62px;right:200px;font-size:13px;font-weight:600;color:#ef4444;background:#fff;padding:6px 12px;border:1px solid #ef4444;border-radius:6px;box-shadow:0 4px 12px rgba(239,68,68,0.18);">
  ① 点击右上角头像 → 弹出菜单点击「个人中心」
</div>

</body>
</html>
