server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript
    min-response-size: 1024

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_test?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&connectionCollation=utf8mb4_0900_ai_ci
    username: root
    password: ENC(K4NdmvWSHXb1hHg5TEcMa7Gkima2Fig+dSdd++5JnV+pwZQcrY5vvu1WIU4nAC9k)
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  mail:
    host: smtp.126.com
    port: 465
    username: aiocloud@126.com
    password: ENC(hHb3OUbIanYmYyMYLSBz1WBtSIgAGZCSeNrIw5SG7BAnQnx6z7/bWx5UGyfI7XRl47T/HC7i3DQjamBSRIOujQ==)
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: "*"
          connectiontimeout: 5000
          timeout: 5000

# 流程自动化调度器开关（线上环境开启，本地环境关闭）
process:
  auto:
    scheduler:
      enabled: ${PROCESS_AUTO_SCHEDULER_ENABLED:true}

# 线上服务配置（本地环境用于流程管理状态同步）
online:
  api:
    base-url: ${ONLINE_API_BASE_URL:}
    # 内部通信密钥，线上需配置相同值以放行本地请求
    secret: ${ONLINE_API_SECRET:}

# Tab 可见性配置（环境变量控制，逗号分隔）
app:
  visible-tabs:
    process-manage: ${VISIBLE_PROCESS_TABS:pending,approved,pushed,rejected,pushed-up,push-logs}

# Jasypt 配置（生产环境通过环境变量 JASYPT_ENCRYPTOR_PASSWORD 提供密钥）
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:}
    algorithm: PBEWithHMACSHA512AndAES_256

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.blogger.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    name: logs/admin-backend.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  level:
    root: INFO
    com.example.blogger: DEBUG
    com.example.blogger.mapper: DEBUG
