server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blogger_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# Jasypt 配置（生产环境通过环境变量 JASYPT_ENCRYPTOR_PASSWORD 提供密钥）
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:}
    algorithm: PBEWithHMACSHA512AndAES_256

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.user.entity
  configuration:
    map-underscore-to-camel-case: true
